<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Dashboard - Members</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button class="menu-toggle" id="menuToggle">☰ Menu</button>

    <div class="dashboard-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>FaithPortal</h2>
            </div>
            <ul class="sidebar-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="members.html" class="active">Members</a></li>
                <li><a href="activities.html">Activities</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <h1>Membership Management</h1>
            </header>

            <div class="dashboard-grid">
                <div class="card form-card">
                    <h3>Register New Member</h3>
                    <form class="main-form" onsubmit="event.preventDefault(); alert('Member Registered!');">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Member</button>
                    </form>
                </div>

                <div class="card wide-card">
                    <h3>Recent Registrations</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Jane Doe</td>
                                <td>jane@example.com</td>
                                <td><span class="badge active-badge">Active</span></td>
                            </tr>
                            <tr>
                                <td>John Smith</td>
                                <td>john@example.com</td>
                                <td><span class="badge active-badge">Active</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
